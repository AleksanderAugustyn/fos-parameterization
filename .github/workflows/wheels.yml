name: wheels
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # tags for setuptools_scm
      - name: Build manylinux2014 wheel in container
        # GitHub `container:` jobs cannot run CentOS 7 images (Actions' node20
        # runtime needs glibc >= 2.28), hence docker-run-from-host.
        run: |
          docker run --rm -v "$PWD":/io -w /io \
            -e SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FOS_PARAMETERIZATION=${{ github.ref_name }} \
            quay.io/pypa/manylinux2014_x86_64 ./ci/build-wheel.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FOS_PARAMETERIZATION: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --outdir dist_sdist
      - name: Verify sdist installs from the tarball
        # Guards the unbuildable-sdist regression: the tarball must compile
        # with a stock gfortran+cmake host toolchain.
        run: |
          sudo apt-get update && sudo apt-get install -y gfortran cmake make
          python -m venv /tmp/verify-sdist
          /tmp/verify-sdist/bin/pip install dist_sdist/*.tar.gz pytest numpy
          env -u FOS_PARAM_LIB /tmp/verify-sdist/bin/python -m pytest python/tests -q
      - name: Verify wheel in clean venv
        run: |
          python -m venv /tmp/verify-wheel
          /tmp/verify-wheel/bin/pip install wheelhouse/*.whl pytest numpy
          env -u FOS_PARAM_LIB /tmp/verify-wheel/bin/python -m pytest python/tests -q
      - name: Collect dist
        run: |
          mkdir dist
          cp wheelhouse/*.whl dist_sdist/*.tar.gz dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write        # create/upload the Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
  pypi:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/fos-parameterization
    permissions:
      id-token: write        # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
